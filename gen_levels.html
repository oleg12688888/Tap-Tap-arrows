// ─── Direction algorithm: nearest edge wins ──────────────────────────────────
function assignDir(r, c, rows, cols) {
  const dUp    = r;
  const dDown  = rows - 1 - r;
  const dLeft  = c;
  const dRight = cols - 1 - c;
  const min = Math.min(dUp, dDown, dLeft, dRight);
  // tie-break: prefer up/down (vertical) over left/right
  if (dUp === min)    return 'up';
  if (dDown === min)  return 'down';
  if (dLeft === min)  return 'left';
  return 'right';
}

// ─── Solver (same as checker) ─────────────────────────────────────────────────
const DIRS = { up:{dr:-1,dc:0}, down:{dr:1,dc:0}, left:{dr:0,dc:-1}, right:{dr:0,dc:1} };

function solve(rows, cols, tilesWithDir) {
  const grid = Array.from({length:rows}, () => Array(cols).fill(null));
  for (const t of tilesWithDir) grid[t.r][t.c] = {dir:t.dir};

  function canMove(r, c) {
    const t = grid[r]?.[c]; if (!t) return false;
    const d = DIRS[t.dir];
    let cr = r+d.dr, cc = c+d.dc;
    while (cr>=0 && cr<rows && cc>=0 && cc<cols) {
      if (grid[cr][cc]) return false;
      cr+=d.dr; cc+=d.dc;
    }
    return true;
  }

  let changed = true;
  while (changed) {
    changed = false;
    for (let r=0; r<rows; r++) for (let c=0; c<cols; c++) {
      if (grid[r][c] && canMove(r,c)) { grid[r][c]=null; changed=true; }
    }
  }

  const stuck = [];
  for (let r=0; r<rows; r++) for (let c=0; c<cols; c++)
    if (grid[r][c]) stuck.push(`(${r},${c},${grid[r][c].dir})`);
  return { solved: stuck.length===0, stuck };
}

// ─── Generate ─────────────────────────────────────────────────────────────────
let fullOutput = 'const LEVELS = [\n';

function generate() {
  const resultsEl = document.getElementById('results');
  const outputEl  = document.getElementById('output');
  let html = '';
  fullOutput = 'const LEVELS = [\n';

  for (let i = 0; i < SHAPES.length; i++) {
    const s = SHAPES[i];
    const tilesWithDir = s.tiles
      .filter(t => !(s.name === 'Fish' && t.r === 11 && t.c === 0)) // remove placeholder
      .map(t => ({ ...t, dir: assignDir(t.r, t.c, s.rows, s.cols) }));

    const result = solve(s.rows, s.cols, tilesWithDir);
    const ok = result.solved;

    // Build tile array string
    let tileStr = tilesWithDir.map(t =>
      `{r:${t.r},c:${t.c},dir:'${t.dir}',color:'${t.color}'}`
    ).join(',');

    const levelCode = `  // Level ${i+1} — ${s.name}\n  {rows:${s.rows},cols:${s.cols},tiles:[\n    ${
      tilesWithDir.map(t => `{r:${t.r},c:${t.c},dir:'${t.dir}',color:'${t.color}'}`).join(',\n    ')
    }\n  ]},\n`;

    fullOutput += levelCode;

    html += `<div class="level-out">
      <h3>${ok ? '✅' : '❌'} Level ${i+1} — ${s.name} (${tilesWithDir.length} tiles)</h3>
      ${ok ? '' : `<div class="fail">Stuck: ${result.stuck.join(' ')}</div>`}
    </div>`;
  }

  fullOutput += '];\n';
  resultsEl.innerHTML = html;
  outputEl.value = fullOutput;
}
