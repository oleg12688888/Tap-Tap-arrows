<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Level Solvability Checker</title>
<style>
  body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
  h1 { color: #e94560; }
  .level { margin: 10px 0; padding: 12px; border-radius: 8px; }
  .ok   { background: #0f2a1e; border-left: 4px solid #0f9b58; }
  .fail { background: #2d1515; border-left: 4px solid #e94560; }
  .title { font-size: 1.1em; font-weight: bold; }
  .detail { color: #aaa; margin-top: 4px; font-size: 0.9em; }
  .stuck  { color: #e94560; font-size: 0.82em; margin-top: 4px; word-break: break-all; }
  .warn   { color: #f39c12; font-size: 0.82em; margin-top: 2px; }
  .summary { margin-top: 20px; padding: 14px; background: #16213e; border-radius: 8px; font-size: 1.1em; }
</style>
</head>
<body>
<h1>🔍 Level Solvability Checker</h1>
<div id="out"></div>

<script>
// ─── Solver ──────────────────────────────────────────────────────────────────
const DIRS = {
  up:{dr:-1,dc:0}, down:{dr:1,dc:0}, left:{dr:0,dc:-1}, right:{dr:0,dc:1}
};

function solve(level) {
  const {rows, cols, tiles} = level;
  const grid = Array.from({length:rows}, () => Array(cols).fill(null));
  const seen = {};
  for (const t of tiles) {
    const k = `${t.r},${t.c}`;
    seen[k] = (seen[k]||0) + 1;
    grid[t.r][t.c] = {dir: t.dir};
  }
  const dups = Object.entries(seen).filter(([,v])=>v>1).map(([k,v])=>`(${k})×${v}`);

  function canMove(r,c) {
    const t = grid[r]?.[c];
    if (!t) return false;
    const d = DIRS[t.dir];
    let cr = r+d.dr, cc = c+d.dc;
    while (cr>=0 && cr<rows && cc>=0 && cc<cols) {
      if (grid[cr][cc]) return false;
      cr+=d.dr; cc+=d.dc;
    }
    return true;
  }

  let steps = 0;
  let changed = true;
  while (changed) {
    changed = false;
    for (let r=0; r<rows; r++) for (let c=0; c<cols; c++) {
      if (grid[r][c] && canMove(r,c)) {
        grid[r][c] = null;
        steps++;
        changed = true;
      }
    }
  }

  const stuck = [];
  for (let r=0; r<rows; r++) for (let c=0; c<cols; c++)
    if (grid[r][c]) stuck.push(`(${r},${c},${grid[r][c].dir})`);

  return { solved: stuck.length===0, steps, stuck, dups, total: tiles.length };
}

// ─── Level data ──────────────────────────────────────────────────────────────
const LEVELS = [
  // Level 1 — Heart (rows:7, cols:7)
  {rows:7,cols:7,tiles:[
    {r:0,c:1,dir:'up'},{r:0,c:2,dir:'up'},{r:0,c:4,dir:'up'},{r:0,c:5,dir:'up'},
    {r:1,c:0,dir:'left'},{r:1,c:1,dir:'up'},{r:1,c:2,dir:'down'},{r:1,c:3,dir:'left'},{r:1,c:4,dir:'left'},{r:1,c:5,dir:'left'},{r:1,c:6,dir:'right'},
    {r:2,c:0,dir:'left'},{r:2,c:1,dir:'left'},{r:2,c:2,dir:'down'},{r:2,c:3,dir:'right'},{r:2,c:4,dir:'left'},{r:2,c:5,dir:'right'},{r:2,c:6,dir:'right'},
    {r:3,c:1,dir:'right'},{r:3,c:2,dir:'right'},{r:3,c:3,dir:'down'},{r:3,c:4,dir:'left'},{r:3,c:5,dir:'down'},{r:3,c:6,dir:'right'},
    {r:4,c:2,dir:'right'},{r:4,c:3,dir:'down'},{r:4,c:4,dir:'left'},{r:4,c:5,dir:'right'},
    {r:5,c:3,dir:'down'},{r:5,c:4,dir:'down'},
    {r:6,c:3,dir:'down'},
  ]},
  // Level 2 — Dog (rows:12, cols:14)
  {rows:12,cols:14,tiles:[
    {r:0,c:8,dir:'up'},{r:0,c:9,dir:'up'},{r:0,c:10,dir:'up'},

    {r:2,c:3,dir:'up'},{r:2,c:4,dir:'left'},{r:2,c:5,dir:'up'},{r:2,c:6,dir:'right'},{r:2,c:7,dir:'down'},{r:2,c:8,dir:'left'},{r:2,c:9,dir:'up'},{r:2,c:10,dir:'right'},{r:2,c:11,dir:'down'},{r:2,c:12,dir:'right'},
    {r:3,c:2,dir:'up'},{r:3,c:3,dir:'left'},{r:3,c:4,dir:'right'},{r:3,c:5,dir:'down'},{r:3,c:6,dir:'left'},{r:3,c:7,dir:'right'},{r:3,c:8,dir:'up'},{r:3,c:9,dir:'right'},{r:3,c:10,dir:'down'},{r:3,c:11,dir:'left'},{r:3,c:12,dir:'right'},{r:3,c:13,dir:'right'},
    {r:4,c:0,dir:'left'},{r:4,c:1,dir:'down'},{r:4,c:2,dir:'left'},{r:4,c:3,dir:'right'},{r:4,c:4,dir:'up'},{r:4,c:5,dir:'down'},{r:4,c:6,dir:'left'},{r:4,c:7,dir:'right'},{r:4,c:8,dir:'up'},{r:4,c:9,dir:'down'},{r:4,c:10,dir:'right'},{r:4,c:11,dir:'up'},{r:4,c:12,dir:'right'},{r:4,c:13,dir:'right'},
    {r:5,c:0,dir:'left'},{r:5,c:1,dir:'left'},{r:5,c:2,dir:'right'},{r:5,c:3,dir:'left'},{r:5,c:4,dir:'up'},{r:5,c:5,dir:'down'},{r:5,c:6,dir:'down'},{r:5,c:7,dir:'up'},{r:5,c:8,dir:'left'},{r:5,c:9,dir:'right'},{r:5,c:10,dir:'down'},{r:5,c:11,dir:'up'},{r:5,c:12,dir:'right'},{r:5,c:13,dir:'right'},
    {r:6,c:0,dir:'left'},{r:6,c:1,dir:'left'},{r:6,c:2,dir:'right'},{r:6,c:3,dir:'down'},{r:6,c:4,dir:'left'},{r:6,c:5,dir:'right'},{r:6,c:6,dir:'up'},{r:6,c:7,dir:'down'},{r:6,c:8,dir:'right'},{r:6,c:9,dir:'left'},{r:6,c:10,dir:'up'},{r:6,c:11,dir:'right'},{r:6,c:12,dir:'down'},{r:6,c:13,dir:'right'},
    {r:7,c:2,dir:'right'},{r:7,c:3,dir:'left'},{r:7,c:4,dir:'up'},{r:7,c:5,dir:'down'},{r:7,c:6,dir:'right'},{r:7,c:7,dir:'left'},{r:7,c:8,dir:'up'},{r:7,c:9,dir:'down'},{r:7,c:10,dir:'right'},{r:7,c:11,dir:'left'},{r:7,c:12,dir:'up'},{r:7,c:13,dir:'right'},
    {r:8,c:2,dir:'right'},{r:8,c:3,dir:'down'},{r:8,c:4,dir:'left'},{r:8,c:5,dir:'right'},{r:8,c:6,dir:'down'},{r:8,c:7,dir:'up'},{r:8,c:8,dir:'left'},{r:8,c:9,dir:'down'},{r:8,c:10,dir:'right'},{r:8,c:11,dir:'down'},{r:8,c:12,dir:'right'},
    {r:9,c:2,dir:'down'},{r:9,c:3,dir:'right'},{r:9,c:4,dir:'down'},{r:9,c:7,dir:'down'},{r:9,c:8,dir:'right'},{r:9,c:9,dir:'down'},{r:9,c:10,dir:'left'},{r:9,c:11,dir:'down'},{r:9,c:12,dir:'right'},
    {r:10,c:2,dir:'down'},{r:10,c:3,dir:'down'},{r:10,c:5,dir:'down'},{r:10,c:6,dir:'down'},{r:10,c:9,dir:'down'},{r:10,c:10,dir:'down'},{r:10,c:12,dir:'down'},{r:10,c:13,dir:'down'},
    {r:11,c:2,dir:'down'},{r:11,c:3,dir:'down'},{r:11,c:5,dir:'down'},{r:11,c:6,dir:'down'},{r:11,c:9,dir:'down'},{r:11,c:10,dir:'down'},{r:11,c:12,dir:'down'},{r:11,c:13,dir:'down'},
  ]},
  // Level 3 — Chicken (rows:13, cols:15)
  {rows:13,cols:15,tiles:[
    {r:0,c:0,dir:'down'},{r:0,c:1,dir:'left'},
    {r:1,c:0,dir:'down'},{r:1,c:1,dir:'up'},
    {r:2,c:1,dir:'up'},{r:2,c:2,dir:'left'},{r:2,c:3,dir:'left'},{r:2,c:4,dir:'up'},{r:2,c:5,dir:'up'},{r:2,c:6,dir:'up'},{r:2,c:7,dir:'left'},{r:2,c:8,dir:'right'},{r:2,c:9,dir:'left'},{r:2,c:10,dir:'left'},
    {r:3,c:2,dir:'down'},{r:3,c:3,dir:'right'},{r:3,c:4,dir:'up'},{r:3,c:5,dir:'up'},{r:3,c:6,dir:'right'},{r:3,c:7,dir:'right'},{r:3,c:8,dir:'right'},{r:3,c:9,dir:'right'},{r:3,c:10,dir:'right'},{r:3,c:11,dir:'right'},
    {r:4,c:0,dir:'left'},{r:4,c:1,dir:'up'},{r:4,c:2,dir:'right'},{r:4,c:3,dir:'left'},{r:4,c:4,dir:'right'},{r:4,c:5,dir:'up'},{r:4,c:6,dir:'down'},{r:4,c:7,dir:'up'},{r:4,c:8,dir:'right'},{r:4,c:9,dir:'up'},{r:4,c:10,dir:'up'},{r:4,c:11,dir:'right'},{r:4,c:12,dir:'right'},
    {r:5,c:0,dir:'left'},{r:5,c:1,dir:'up'},{r:5,c:2,dir:'down'},{r:5,c:3,dir:'left'},{r:5,c:4,dir:'down'},{r:5,c:5,dir:'down'},{r:5,c:6,dir:'down'},{r:5,c:7,dir:'up'},{r:5,c:8,dir:'right'},{r:5,c:9,dir:'down'},{r:5,c:10,dir:'up'},{r:5,c:11,dir:'down'},{r:5,c:12,dir:'down'},
    {r:6,c:0,dir:'down'},{r:6,c:1,dir:'down'},{r:6,c:2,dir:'down'},{r:6,c:3,dir:'up'},{r:6,c:4,dir:'left'},{r:6,c:5,dir:'left'},{r:6,c:6,dir:'down'},{r:6,c:7,dir:'down'},{r:6,c:8,dir:'down'},{r:6,c:9,dir:'down'},{r:6,c:10,dir:'up'},{r:6,c:11,dir:'left'},{r:6,c:12,dir:'left'},
    {r:7,c:1,dir:'left'},{r:7,c:2,dir:'left'},{r:7,c:3,dir:'up'},{r:7,c:4,dir:'up'},{r:7,c:5,dir:'left'},{r:7,c:6,dir:'left'},{r:7,c:7,dir:'left'},{r:7,c:8,dir:'left'},{r:7,c:9,dir:'left'},{r:7,c:10,dir:'left'},{r:7,c:11,dir:'left'},{r:7,c:12,dir:'left'},
    {r:8,c:2,dir:'left'},{r:8,c:3,dir:'left'},{r:8,c:4,dir:'up'},{r:8,c:5,dir:'up'},{r:8,c:6,dir:'left'},{r:8,c:7,dir:'left'},{r:8,c:8,dir:'left'},{r:8,c:9,dir:'left'},{r:8,c:10,dir:'left'},{r:8,c:11,dir:'up'},{r:8,c:12,dir:'down'},
    {r:9,c:0,dir:'right'},{r:9,c:1,dir:'down'},{r:9,c:2,dir:'left'},{r:9,c:3,dir:'left'},{r:9,c:6,dir:'left'},{r:9,c:7,dir:'left'},{r:9,c:8,dir:'left'},{r:9,c:9,dir:'down'},{r:9,c:10,dir:'down'},{r:9,c:11,dir:'down'},{r:9,c:12,dir:'down'},
    {r:10,c:6,dir:'down'},{r:10,c:7,dir:'down'},{r:10,c:8,dir:'left'},{r:10,c:9,dir:'down'},{r:10,c:10,dir:'left'},{r:10,c:11,dir:'left'},{r:10,c:12,dir:'left'},{r:10,c:13,dir:'left'},
    {r:11,c:6,dir:'left'},{r:11,c:7,dir:'right'},{r:11,c:8,dir:'down'},{r:11,c:9,dir:'down'},{r:11,c:10,dir:'right'},{r:11,c:11,dir:'right'},{r:11,c:12,dir:'right'},
    {r:12,c:6,dir:'down'},{r:12,c:7,dir:'left'},{r:12,c:8,dir:'down'},{r:12,c:9,dir:'down'},{r:12,c:10,dir:'left'},{r:12,c:11,dir:'left'},{r:12,c:12,dir:'left'},
  ]},
];

const NAMES = ['Heart','Dog','Chicken'];

// ─── Run ──────────────────────────────────────────────────────────────────────
let html = '', passed = 0, failed = 0;

for (let i = 0; i < LEVELS.length; i++) {
  const r = solve(LEVELS[i]);
  const ok = r.solved;
  if (ok) passed++; else failed++;

  let detail = `Tiles: ${r.total} | Removed: ${r.steps}`;
  let extra = '';
  if (r.dups.length) extra += `<div class="warn">⚠️ Duplicate positions: ${r.dups.join(', ')}</div>`;
  if (!ok) extra += `<div class="stuck">Stuck (${r.stuck.length}): ${r.stuck.join(' ')}</div>`;

  html += `<div class="level ${ok?'ok':'fail'}">
    <div class="title">${ok?'✅':'❌'} Level ${i+1} — ${NAMES[i]}</div>
    <div class="detail">${detail}</div>
    ${extra}
  </div>`;
}

html += `<div class="summary">
  Result: <span style="color:#0f9b58">✅ ${passed} solved</span> &nbsp;
  <span style="color:#e94560">❌ ${failed} deadlocked</span> &nbsp;
  / ${LEVELS.length} total
</div>`;

document.getElementById('out').innerHTML = html;
</script>
</body>
</html>
